<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YouTubeダウンローダー。高画質で動画をダウンロード。MP4、MP3、WAVなど対応。">
  <meta name="author" content="Psan">
  <link rel="icon" href="favicon.jpeg">
  <title>YouTube ダウンローダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast-container"></div>
  <div class="container">
    <h1>YouTube Downloader</h1>

    <div class="form-group">
      <label for="ws-url-select">サーバー</label>
      <div class="server-select-wrapper">
        <select id="ws-url-select">
          <option value="">読み込み中...</option>
        </select>
        <div id="connection-status" class="connection-status">
          <span class="status-dot status-disconnected"></span>
          <span class="status-text">未接続</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="url-input">YouTube URL</label>
      <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <div class="form-group">
      <label for="format-select">デフォルト形式</label>
      <select id="format-select">
        <optgroup label="動画">
          <option value="mp4">MP4 (1080p)</option>
          <option value="mp4_720">MP4 (720p)</option>
          <option value="mp4_480">MP4 (480p)</option>
          <option value="mkv">MKV</option>
        </optgroup>
        <optgroup label="音声">
          <option value="mp3">MP3 (320kbps)</option>
          <option value="mp3_128">MP3 (128kbps)</option>
          <option value="wav">WAV</option>
          <option value="flac">FLAC (ロスレス)</option>
          <option value="aac">AAC</option>
          <option value="opus">Opus</option>
        </optgroup>
      </select>
    </div>

    <div class="button-row">
      <button id="add-button" class="btn btn-primary btn-block">リストに追加</button>
    </div>
    <div class="button-row">
      <button id="download-all-button" class="btn btn-success">一括ダウンロード</button>
      <button id="clear-completed-button" class="btn btn-danger">完了を削除</button>
      <button id="clear-all-button" class="btn btn-danger">すべて削除</button>
    </div>

    <div class="list-header">
      <h2>ダウンロードリスト (<span id="list-count">0</span>)</h2>
      <input type="text" id="search-box" class="search-box" placeholder="検索...">
    </div>
    <ul id="request-list">
      <li class="empty-list">まだリストにアイテムがありません</li>
    </ul>

    <div class="copyright">
      <span>©Psannetwork 2023-2026</span> YouTube Downloader. Written by psan.
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/download-list.js"></script>
  <script src="js/ws-data-handler.js"></script>
  <script src="js/event-handlers.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
