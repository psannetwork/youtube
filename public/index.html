<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YouTubeダウンローダー。高画質で動画をダウンロード。MP4、MP3、WAVなど対応。">
  <meta name="author" content="Psan">
  <link rel="icon" href="favicon.jpeg">
  <title>YouTube ダウンローダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast-container"></div>
  <div class="container">
    <h1>📺 YouTube ダウンローダー</h1>

    <div class="form-group">
      <label for="ws-url-select">🌐 サーバー</label>
      <div class="server-select-wrapper">
        <select id="ws-url-select">
          <option value="">読み込み中...</option>
        </select>
        <div id="connection-status" class="connection-status">
          <span class="status-dot status-disconnected"></span>
          <span class="status-text">未接続</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="url-input">🔗 YouTube URL</label>
      <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <div class="form-group">
      <label for="format-select">📦 デフォルト形式</label>
      <select id="format-select">
        <optgroup label="動画">
          <option value="mp4">MP4 (1080p)</option>
          <option value="mp4_720">MP4 (720p)</option>
          <option value="mp4_480">MP4 (480p)</option>
          <option value="mkv">MKV</option>
        </optgroup>
        <optgroup label="音声">
          <option value="mp3">MP3 (320kbps)</option>
          <option value="mp3_128">MP3 (128kbps)</option>
          <option value="wav">WAV</option>
          <option value="flac">FLAC (ロスレス)</option>
          <option value="aac">AAC</option>
          <option value="opus">Opus</option>
        </optgroup>
      </select>
    </div>

    <div class="button-row">
      <button id="add-button" class="btn btn-primary btn-block">➕ リストに追加</button>
    </div>
    <div class="button-row">
      <button id="download-all-button" class="btn btn-success">⬇️ 一括ダウンロード</button>
      <button id="clear-completed-button" class="btn btn-danger">🗑️ 完了を削除</button>
      <button id="clear-all-button" class="btn btn-danger">🗑️ すべて削除</button>
    </div>

    <div class="list-header">
      <h2>📋 ダウンロードリスト (<span id="list-count">0</span>)</h2>
      <input type="text" id="search-box" class="search-box" placeholder="🔍 検索...">
    </div>
    <ul id="request-list">
      <li class="empty-list">まだリストにアイテムがありません</li>
    </ul>

    <div class="copyright">
      <span>©Psannetwork 2025</span> YouTube Downloader. Written by psan.
    </div>
  </div>

  <script>
    let ws;
    let requestIdCounter = 0;
    const requests = {};
    let pingInterval = null;
    let reconnectTimer = null;

    const CLIENT_VERSION = '2.0.1';

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('toast-out');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function updateConnectionStatus(status, text) {
      const dot = document.querySelector('#connection-status .status-dot');
      const statusText = document.querySelector('#connection-status .status-text');
      if (dot) {
        dot.className = `status-dot status-${status}`;
      }
      if (statusText) {
        statusText.textContent = text;
      }
    }

    function checkVersion(ws) {
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          reject(new Error('バージョンチェックがタイムアウトしました'));
        }, 5000);

        const handler = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'version_info') {
              ws.removeEventListener('message', handler);
              clearTimeout(timeout);

              const serverVersion = data.version;
              if (serverVersion !== CLIENT_VERSION) {
                resolve({
                  match: false,
                  client: CLIENT_VERSION,
                  server: serverVersion,
                  message: `バージョンが一致しません (クライアント: ${CLIENT_VERSION} / サーバー: ${serverVersion})`
                });
              } else {
                resolve({ match: true, version: serverVersion });
              }
            }
          } catch (e) {
          }
        };

        ws.addEventListener('message', handler);
        ws.send(JSON.stringify({ type: 'version_check' }));
      });
    }

    function pingTest(ws) {
      return new Promise((resolve) => {
        const timeout = setTimeout(() => {
          resolve(false);
        }, 5000);

        const handler = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'pong') {
              ws.removeEventListener('message', handler);
              clearTimeout(timeout);
              resolve(true);
            }
          } catch (e) {
          }
        };

        ws.addEventListener('message', handler);
        ws.send(JSON.stringify({ type: 'ping' }));
      });
    }

    function startPing() {
      if (pingInterval) clearInterval(pingInterval);
      pingInterval = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 10000);
    }

    function stopPing() {
      if (pingInterval) {
        clearInterval(pingInterval);
        pingInterval = null;
      }
    }

    fetch('url_list.json')
      .then(response => response.json())
      .then(urlList => {
        const wsSelect = document.getElementById('ws-url-select');
        wsSelect.innerHTML = '';
        urlList.forEach((urlItem) => {
          const option = document.createElement('option');
          option.value = urlItem.url;
          option.textContent = urlItem.name;
          wsSelect.appendChild(option);
        });

        wsSelect.addEventListener('change', () => {
          const selectedUrl = wsSelect.value;
          if (selectedUrl) {
            setupWebSocket(selectedUrl);
          }
        });

        if (urlList.length > 0) {
          setupWebSocket(urlList[0].url);
          wsSelect.value = urlList[0].url;
        }
      })
      .catch(error => {
        console.error('URLリストの読み込みに失敗しました:', error);
        updateConnectionStatus('disconnected', '設定エラー');
      });


    function setupWebSocket(url) {
      if (ws) {
        stopPing();
        ws.close();
      }

      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      updateConnectionStatus('connecting', '接続中...');

      ws = new WebSocket(url);

      ws.onopen = async () => {
        updateConnectionStatus('connecting', 'バージョン確認中...');

        try {
          const versionResult = await checkVersion(ws);
          if (!versionResult.match) {
            updateConnectionStatus('disconnected', 'バージョン不一致');
            showToast(`バージョンが一致しません (クライアント: ${CLIENT_VERSION} / サーバー: ${versionResult.server})`, 'error');
            ws.close();
            return;
          }

          updateConnectionStatus('connecting', '接続テスト中...');

          const pingOk = await pingTest(ws);
          if (!pingOk) {
            updateConnectionStatus('disconnected', '接続失敗');
            showToast('サーバーとの通信が確立できませんでした', 'error');
            ws.close();
            return;
          }

          updateConnectionStatus('connected', `接続済み v${versionResult.version}`);
          startPing();
        } catch (err) {
          updateConnectionStatus('disconnected', '接続失敗');
          showToast(`接続に失敗しました: ${err.message}`, 'error');
        }
      };

      ws.onclose = () => {
        stopPing();
        updateConnectionStatus('reconnecting', '再接続中...');
        reconnectTimer = setTimeout(() => {
          if (!ws || ws.readyState === WebSocket.CLOSED) {
            setupWebSocket(url);
          }
        }, 5000);
      };

      ws.onerror = () => {
        updateConnectionStatus('disconnected', '接続エラー');
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'pong') {
            return;
          }

          const { requestId, type, percentage, files, message } = data;

          if (type === 'progress') {
            const progressBar = document.querySelector(`#progress-${requestId}`);
            const statusBadge = document.querySelector(`#status-${requestId}`);
            if (progressBar) {
              progressBar.style.width = `${percentage}%`;
            }
            if (statusBadge) {
              statusBadge.textContent = `${percentage}%`;
              statusBadge.className = 'status-badge status-downloading';
            }
          } else if (type === 'complete') {
            const linkContainer = document.querySelector(`#link-${requestId}`);
            const progressBar = document.querySelector(`#progress-bar-${requestId}`);
            const statusBadge = document.querySelector(`#status-${requestId}`);
            const downloadBtn = document.querySelector(`#download-btn-${requestId}`);
            const stopBtn = document.querySelector(`#stop-btn-${requestId}`);

            if (linkContainer) {
              if (files && files.length > 0) {
                const baseHttpUrl = convertWsToHttp(ws.url);

                linkContainer.innerHTML = files
                  .map((file) => {
                    if (!file.fileUrl) {
                      return '<span>無効なURL</span>';
                    }

                    let newFileUrl;
                    try {
                      newFileUrl = new URL(file.fileUrl, baseHttpUrl).href;
                    } catch (error) {
                      return '<span>URLの解析に失敗しました</span>';
                    }

                    return `<a href="${newFileUrl}" download>📥 ${file.fileName}</a>`;
                  })
                  .join('');
              } else {
                linkContainer.innerHTML = '<span>ファイルが見つかりません</span>';
              }
            }

            if (progressBar) {
              progressBar.classList.add('complete');
              const progress = document.querySelector(`#progress-${requestId}`);
              if (progress) progress.style.width = '100%';
            }

            if (statusBadge) {
              statusBadge.textContent = '完了';
              statusBadge.className = 'status-badge status-complete';
            }

            if (downloadBtn) {
              downloadBtn.disabled = true;
              downloadBtn.textContent = '✅ 完了';
            }

            if (stopBtn) {
              stopBtn.style.display = 'none';
            }

            updateCount();
          } else if (type === 'stopped') {
            const statusBadge = document.querySelector(`#status-${requestId}`);
            const downloadBtn = document.querySelector(`#download-btn-${requestId}`);
            const stopBtn = document.querySelector(`#stop-btn-${requestId}`);
            const progressBar = document.querySelector(`#progress-bar-${requestId}`);

            if (statusBadge) {
              statusBadge.textContent = '停止';
              statusBadge.className = 'status-badge status-error';
            }

            if (downloadBtn) {
              downloadBtn.disabled = false;
              downloadBtn.textContent = '⬇️ 再ダウンロード';
            }

            if (stopBtn) {
              stopBtn.style.display = 'none';
            }

            if (progressBar) {
              progressBar.classList.add('error');
            }
          } else if (type === 'error') {
            const progressBar = document.querySelector(`#progress-bar-${requestId}`);
            const statusBadge = document.querySelector(`#status-${requestId}`);
            const downloadBtn = document.querySelector(`#download-btn-${requestId}`);
            const stopBtn = document.querySelector(`#stop-btn-${requestId}`);

            if (progressBar) {
              progressBar.classList.add('error');
            }

            if (statusBadge) {
              statusBadge.textContent = 'エラー';
              statusBadge.className = 'status-badge status-error';
            }

            if (downloadBtn) {
              downloadBtn.disabled = false;
              downloadBtn.textContent = '⬇️ 再ダウンロード';
            }

            if (stopBtn) {
              stopBtn.style.display = 'none';
            }

            showToast(`エラー: ${message}`, 'error');
          }
        } catch (error) {
          console.error('WebSocketメッセージの処理中にエラーが発生しました:', error);
        }
      };
    }

    function convertWsToHttp(wsUrl) {
      if (wsUrl.startsWith("wss://")) {
        return wsUrl.replace("wss://", "https://");
      }
      return wsUrl.replace("ws://", "http://");
    }


    document.getElementById('add-button').addEventListener('click', async () => {
      const url = document.getElementById('url-input').value.trim();
      const format = document.getElementById('format-select').value;

      if (!url || !/^https?:\/\/(www\.)?youtube\.com\/|youtu\.be\//.test(url)) {
        showToast('正しいYouTube URLを入力してください', 'error');
        return;
      }

      if (url.includes('/playlists')) {
        try {
          const response = await fetch(`/fetch-channel-playlists?url=${encodeURIComponent(url)}`);
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'チャンネルのプレイリスト取得に失敗しました');
          }
          const data = await response.json();
          const playlists = data.playlists;

          for (const playlist of playlists) {
            const playlistId = playlist.id;
            try {
              const playlistResponse = await fetch(`/fetch-playlist?playlistId=${playlistId}`);
              if (!playlistResponse.ok) continue;
              const playlistData = await playlistResponse.json();
              const videos = playlistData.videos;

              videos.forEach((video) => {
                const cleanedUrl = cleanYouTubeUrl(video.url);
                const requestId = ++requestIdCounter;
                requests[requestId] = { url: cleanedUrl, format };
                addItemToList(requestId, `[${playlist.title}] ${video.title}`, format);
              });
            } catch (err) {
              console.error(`プレイリスト取得エラー (${playlist.title}):`, err.message);
            }
          }
        } catch (err) {
          showToast(`チャンネルのプレイリスト取得エラー: ${err.message}`, 'error');
        }
      } else {
        const playlistMatch = url.match(/(?:\?|\&)list=([^&]+)/);
        if (playlistMatch) {
          const playlistId = playlistMatch[1];

          if (playlistId.startsWith('RD')) {
            const cleanedUrl = cleanYouTubeUrl(url);
            const requestId = ++requestIdCounter;
            requests[requestId] = { url: cleanedUrl, format };
            addItemToList(requestId, 'ラジオミックス', format);
            return;
          }

          try {
            const playlistResponse = await fetch(`/fetch-playlist?playlistId=${playlistId}`);
            if (!playlistResponse.ok) {
              const errorData = await playlistResponse.json();
              throw new Error(errorData.error || 'プレイリストの取得に失敗しました');
            }
            const playlistData = await playlistResponse.json();
            const videos = playlistData.videos;

            videos.forEach((video) => {
              const cleanedUrl = cleanYouTubeUrl(video.url);
              const requestId = ++requestIdCounter;
              requests[requestId] = { url: cleanedUrl, format };
              addItemToList(requestId, video.title, format);
            });
          } catch (err) {
            showToast(`プレイリスト取得エラー: ${err.message}`, 'error');
          }
        } else {
          const cleanedUrl = cleanYouTubeUrl(url);
          const requestId = ++requestIdCounter;
          requests[requestId] = { url: cleanedUrl, format };

          const videoIdMatch = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
          const title = videoIdMatch ? `Video ${videoIdMatch[1]}` : cleanedUrl;
          addItemToList(requestId, title, format);
        }
      }

      document.getElementById('url-input').value = '';
    });

    function addItemToList(requestId, title, format) {
      const emptyMsg = document.querySelector('.empty-list');
      if (emptyMsg) emptyMsg.remove();

      const formatOptions = [
        { value: 'mp4', label: 'MP4 (1080p)' },
        { value: 'mp4_720', label: 'MP4 (720p)' },
        { value: 'mp4_480', label: 'MP4 (480p)' },
        { value: 'mkv', label: 'MKV' },
        { value: 'mp3', label: 'MP3 (320k)' },
        { value: 'mp3_128', label: 'MP3 (128k)' },
        { value: 'wav', label: 'WAV' },
        { value: 'flac', label: 'FLAC' },
        { value: 'aac', label: 'AAC' },
        { value: 'opus', label: 'Opus' }
      ];

      const formatSelectHtml = `
        <select class="item-format-select" id="format-select-${requestId}" onchange="changeItemFormat(${requestId})">
          ${formatOptions.map(opt => `<option value="${opt.value}" ${opt.value === format ? 'selected' : ''}>${opt.label}</option>`).join('')}
        </select>
      `;

      const listItem = document.createElement('li');
      listItem.id = `request-${requestId}`;
      listItem.dataset.title = title.toLowerCase();
      listItem.innerHTML = `
        <div class="item-header">
          <div>
            <span class="item-title">${escapeHtml(title)}</span>
            ${formatSelectHtml}
            <span class="status-badge status-waiting" id="status-${requestId}">待機中</span>
          </div>
          <div class="item-actions">
            <button id="download-btn-${requestId}" class="btn btn-sm btn-primary" onclick="startDownload(${requestId})">⬇️ ダウンロード</button>
            <button id="stop-btn-${requestId}" class="btn btn-sm btn-danger" onclick="stopDownload(${requestId})" style="display:none;">⏹ 停止</button>
            <button class="btn btn-sm btn-danger" onclick="removeItem(${requestId})">✕</button>
          </div>
        </div>
        <div class="progress-bar" id="progress-bar-${requestId}" style="display:block;">
          <div class="progress" id="progress-${requestId}"></div>
        </div>
        <div id="link-${requestId}" class="link-container"></div>
      `;
      document.getElementById('request-list').appendChild(listItem);
      updateCount();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function removeItem(requestId) {
      const item = document.getElementById(`request-${requestId}`);
      if (item) {
        item.remove();
        delete requests[requestId];
        updateCount();
        checkEmpty();
      }
    }

    function changeItemFormat(requestId) {
      const select = document.getElementById(`format-select-${requestId}`);
      if (select && requests[requestId]) {
        requests[requestId].format = select.value;
      }
    }

    function showConfirm(message) {
      return new Promise((resolve) => {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast toast-info';
        toast.style.flexDirection = 'column';
        toast.style.gap = '12px';
        toast.style.alignItems = 'stretch';
        toast.innerHTML = `<div>${message}</div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn btn-sm btn-danger confirm-cancel">キャンセル</button><button class="btn btn-sm btn-success confirm-ok">OK</button></div>`;
        container.appendChild(toast);
        toast.querySelector('.confirm-ok').addEventListener('click', () => {
          toast.remove();
          resolve(true);
        });
        toast.querySelector('.confirm-cancel').addEventListener('click', () => {
          toast.remove();
          resolve(false);
        });
      });
    }

    function clearAll() {
      if (Object.keys(requests).length === 0) return;
      showConfirm('すべてのアイテムを削除しますか？').then((ok) => {
        if (!ok) return;
        const list = document.getElementById('request-list');
        list.innerHTML = '<li class="empty-list">まだリストにアイテムがありません</li>';
        for (const key in requests) delete requests[key];
        updateCount();
      });
    }

    function checkEmpty() {
      const list = document.getElementById('request-list');
      if (list.children.length === 0) {
        list.innerHTML = '<li class="empty-list">まだリストにアイテムがありません</li>';
      }
    }

    function updateCount() {
      document.getElementById('list-count').textContent = Object.keys(requests).length;
    }

    document.getElementById('search-box').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const items = document.querySelectorAll('#request-list li');
      items.forEach(item => {
        if (item.classList.contains('empty-list')) return;
        const title = item.dataset.title || '';
        item.style.display = title.includes(query) ? '' : 'none';
      });
    });

    document.getElementById('download-all-button').addEventListener('click', () => {
      const pendingRequests = Object.keys(requests).filter(id => {
        const statusBadge = document.querySelector(`#status-${id}`);
        return statusBadge && statusBadge.textContent === '待機中';
      });

      if (pendingRequests.length === 0) {
        showToast('ダウンロード可能なアイテムがありません', 'info');
        return;
      }

      pendingRequests.forEach(requestId => {
        startDownload(requestId);
      });
    });

    document.getElementById('clear-completed-button').addEventListener('click', () => {
      const items = document.querySelectorAll('#request-list li');
      items.forEach(item => {
        const statusBadge = item.querySelector('.status-badge');
        if (statusBadge && statusBadge.textContent === '完了') {
          item.remove();
        }
      });
      checkEmpty();
      updateCount();
    });

    document.getElementById('clear-all-button').addEventListener('click', clearAll);

    function startDownload(requestId) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        const selectedUrl = document.getElementById('ws-url-select').value;
        if (selectedUrl) {
          setupWebSocket(selectedUrl);
          setTimeout(() => startDownload(requestId), 3000);
        } else {
          showToast('サーバーが選択されていません', 'error');
        }
        return;
      }
      const { url, format } = requests[requestId];
      const statusBadge = document.querySelector(`#status-${requestId}`);
      if (statusBadge) {
        statusBadge.textContent = 'ダウンロード中...';
        statusBadge.className = 'status-badge status-downloading';
      }

      const downloadBtn = document.querySelector(`#download-btn-${requestId}`);
      if (downloadBtn) {
        downloadBtn.disabled = true;
        downloadBtn.textContent = '⏳ 処理中...';
      }

      const stopBtn = document.querySelector(`#stop-btn-${requestId}`);
      if (stopBtn) {
        stopBtn.style.display = 'inline-flex';
      }

      ws.send(JSON.stringify({ requestId, url, format }));
    }

    function stopDownload(requestId) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'stop_download', requestId }));

      const stopBtn = document.querySelector(`#stop-btn-${requestId}`);
      if (stopBtn) {
        stopBtn.disabled = true;
        stopBtn.textContent = '⏹ 停止中...';
      }
    }


    function cleanYouTubeUrl(url) {
      try {
        const urlObj = new URL(url);
        if (urlObj.hostname === 'youtu.be') {
          return `https://www.youtube.com/watch?v=${urlObj.pathname.slice(1)}`;
        }
        if (urlObj.hostname === 'm.youtube.com') {
          return `https://www.youtube.com/watch?v=${urlObj.searchParams.get('v')}`;
        }
        urlObj.searchParams.delete('list');
        urlObj.searchParams.delete('index');
        urlObj.searchParams.delete('start_radio');
        return urlObj.toString();
      } catch {
        return url;
      }
    }
  </script>
</body>
</html>
